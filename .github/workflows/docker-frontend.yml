name: Docker Frontend

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: docker-frontend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: static/package-lock.json

      - name: Install dependencies
        working-directory: static
        run: npm ci

      - name: Build frontend
        working-directory: static
        run: npm run build

  build-x86:
    needs: test
    runs-on: ubuntu-latest
    environment: DOCKERHUB

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get tag
        id: get_tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Build and push Docker image (x86)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.d/frontend-amd64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/urlapi-frontend:${{ env.TAG }}

  build-arm64:
    needs: test
    runs-on: ubuntu-24.04-arm
    environment: DOCKERHUB

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get tag
        id: get_tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Build and push Docker image (arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.d/frontend-arm64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/urlapi-frontend-arm:${{ env.TAG }}
